name: CI

on:
  push:
    branches: [main]

jobs:
  check-api:
    name: Check API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  check-web:
    name: Check Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [check-api, check-web]
    if: always()
    steps:
      - uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_APP }}
          status: ${{ (needs.check-api.result == 'success' && needs.check-web.result == 'success') && 'success' || 'failure' }}
