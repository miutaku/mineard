name: Release

on:
  push:
    tags: ['v*']

jobs:
  release-api:
    name: Release API (Cloudflare Workers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  release-web:
    name: Release Web (Cloudflare Pages)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
      - run: npx wrangler pages deploy dist --project-name=mineard-web --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-api, release-web]
    permissions:
      contents: write
      models: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Get commits since last tag
        id: commits
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline)
          else
            LOG=$(git log --oneline "${PREV_TAG}".."${{ github.ref_name }}")
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Generate changelog with AI
        id: changelog
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          max-tokens: 2000
          system-prompt: |
            個人開発OSSのリリースノートを作成してください。
            gitコミットログをもとに変更内容を日本語で簡潔にまとめてください。
            新機能・バグ修正・変更などをカテゴリ分けしてください。
            挨拶・締めくくり・感謝の言葉は一切不要です。変更内容のみを箇条書きで記載してください。
          prompt: ${{ steps.commits.outputs.log }}
      - name: Create Release
        id: create-release
        run: |
          echo "${{ steps.changelog.outputs.response }}" > changelog.md
          gh release create ${{ github.ref_name }} --notes-file changelog.md --title "${{ github.ref_name }}"

          NOTES="${{ steps.changelog.outputs.response }}"
          TRUNCATED="${NOTES:0:1500}"
          [ ${#NOTES} -gt 1500 ] && TRUNCATED="${TRUNCATED}..."
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$TRUNCATED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_RELEASE }}
          status: success
          title: Release ${{ github.ref_name }}
          description: ${{ steps.create-release.outputs.notes }}

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [release-api, release-web]
    if: always()
    steps:
      - uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_GHA }}
          status: ${{ (needs.release-api.result == 'success' && needs.release-web.result == 'success') && 'success' || 'failure' }}
          title: Release ${{ github.ref_name }}
